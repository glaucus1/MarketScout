<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Scout — Inteligência de Preços</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FREE QR CODE LIBRARY -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100/80 text-slate-800 font-sans min-h-screen">
    
    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-900 to-blue-800 p-4 sticky top-0 z-50 shadow-md backdrop-blur-md bg-opacity-95">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🚀</span>
                <h1 class="text-xl font-black tracking-tight text-white">Market<span class="text-cyan-400 font-light">Scout</span></h1>
            </div>
            <button id="navLoginBtn" class="bg-gradient-to-r from-cyan-400 to-blue-500 text-indigo-950 px-5 py-2 rounded-full shadow-lg shadow-cyan-500/20 text-xs font-bold uppercase transition-all">
                Colaborar
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-6">

        <!-- 1. PUBLIC VIEW -->
        <section id="publicView" class="fade-in bg-white p-6 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
            <div class="mb-6">
                <h2 class="text-xl font-extrabold text-slate-900">Onde está o menor preço?</h2>
                <p class="text-sm text-slate-500">Consulte preços extraídos de cupons fiscais.</p>
            </div>
            <div class="relative mb-6">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-lg">🔍</div>
                <input type="text" id="searchInput" placeholder="Busque por produto..." class="w-full bg-slate-50 border-2 border-slate-100 focus:border-indigo-500 p-3 pl-10 rounded-xl outline-none text-sm">
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-100">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50/80 border-b text-xs text-slate-500 uppercase">
                        <tr><th class="p-3">Produto</th><th class="p-3 text-right">Preço</th><th class="p-3 text-center">Data</th></tr>
                    </thead>
                    <tbody id="resultsTable" class="divide-y divide-slate-100">
                        <!-- Placeholder visual -->
                        <tr><td class="p-3 font-semibold">Coca-Cola 2L</td><td class="p-3 text-right text-emerald-600 font-bold">R$ 9,50</td><td class="p-3 text-center text-slate-400 text-xs">15/06/2026</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 2. LOGIN GATE -->
        <section id="loginGate" class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 hidden fade-in max-w-sm mx-auto mt-8">
            <div class="text-center mb-6">
                <span class="text-4xl block">🔑</span>
                <h2 class="text-lg font-bold">Área do Colaborador</h2>
            </div>
            <input type="password" id="accessCode" placeholder="Digite a chave (SCOUT)" class="w-full border-2 border-slate-100 focus:border-indigo-500 p-3 rounded-xl mb-4 text-center tracking-widest font-bold bg-slate-50 outline-none">
            <div class="flex gap-3">
                <button id="cancelLogin" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-3.5 rounded-xl transition-colors">Voltar</button>
                <button id="loginSubmit" class="w-2/3 bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md">Desbloquear</button>
            </div>
        </section>

        <!-- 3. CONTRIBUTOR WORKSPACE -->
        <section id="contributorPanel" class="bg-white p-6 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 hidden fade-in">
            <div class="border-b border-slate-100 pb-4 mb-4">
                <h2 class="text-lg font-black flex items-center gap-2 text-slate-900"><span class="text-emerald-500">●</span> Extração de Dados</h2>
            </div>
            
            <!-- Input Choice Buttons -->
            <div class="flex gap-2 mb-6">
                <button id="btnStartQR" class="w-1/2 bg-slate-900 text-white font-bold py-3 rounded-xl shadow flex flex-col items-center justify-center gap-1">
                    <span class="text-xl">📷</span><span class="text-xs">Ler QR Code (Preciso)</span>
                </button>
                <label class="w-1/2 bg-indigo-50 text-indigo-900 font-bold py-3 rounded-xl shadow flex flex-col items-center justify-center gap-1 cursor-pointer border border-indigo-200">
                    <span class="text-xl">🖼️</span><span class="text-xs">Enviar Foto (Gemini)</span>
                    <input type="file" id="receiptImage" accept="image/*" capture="environment" class="hidden">
                </label>
            </div>

            <!-- QR Scanner Viewport -->
            <div id="qrReaderContainer" class="hidden mb-6 rounded-xl overflow-hidden border-2 border-indigo-200 shadow-inner bg-black">
                <div id="reader" width="100%"></div>
                <button id="btnCancelQR" class="w-full bg-red-500 text-white font-bold py-2 text-sm">Cancelar Câmera</button>
            </div>

            <!-- Loading Indicator -->
            <div id="loadingStatus" class="hidden text-center p-4 mb-4 bg-blue-50 text-blue-800 rounded-xl text-sm font-semibold">
                ⏳ Analisando dados... aguarde.
            </div>

            <!-- Extracted Data Review Panel -->
            <div id="reviewPanel" class="hidden border-t border-slate-100 pt-6 fade-in">
                <h3 class="font-bold text-sm uppercase text-slate-500 mb-4">📋 Revise e Salve</h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="text" id="storeCnpj" placeholder="CNPJ" class="border-2 border-slate-100 focus:border-indigo-500 p-2.5 rounded-xl text-sm font-medium">
                    <input type="date" id="receiptDate" class="border-2 border-slate-100 focus:border-indigo-500 p-2.5 rounded-xl text-sm font-medium">
                </div>
                <div class="mb-4 border border-slate-100 rounded-xl overflow-hidden">
                    <table class="w-full text-left bg-slate-50">
                        <tbody id="extractedItemsTable" class="text-xs divide-y divide-slate-100"></tbody>
                    </table>
                </div>
                <button class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-500/20 text-sm transition-all active:scale-95">Gravar na Nuvem</button>
            </div>
            
            <div class="mt-8 pt-4 border-t border-slate-100 flex justify-center">
                <button id="logoutBtn" class="text-xs text-slate-400 hover:text-red-500 font-semibold flex items-center gap-1 transition-colors">🚪 Sair do Painel</button>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // CHAVE DE API ATUALIZADA
        const GEMINI_API_KEY = "AIzaSyDg8aRZbe_hIMPRuNWCV1d9xPi9geqWUrE"; 
        
        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCJc-bByB8mQH2LtNY4QyLi0KBSaZecuVU",
            authDomain: "market-scout-353c2.firebaseapp.com",
            projectId: "market-scout-353c2",
            storageBucket: "market-scout-353c2.firebasestorage.app",
            messagingSenderId: "134391595418",
            appId: "1:134391595418:web:5d7040966475f26ed5fa23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- NAVEGAÇÃO E AUTENTICAÇÃO ---
        const views = { 
            public: document.getElementById('publicView'), 
            login: document.getElementById('loginGate'), 
            contributor: document.getElementById('contributorPanel') 
        };

        const show = (v) => { 
            Object.values(views).forEach(el => el.classList.add('hidden')); 
            views[v].classList.remove('hidden'); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        document.getElementById('navLoginBtn').addEventListener('click', () => {
            localStorage.getItem('isAuthorized') === 'true' ? show('contributor') : show('login');
        });
        
        document.getElementById('cancelLogin').addEventListener('click', () => show('public'));

        document.getElementById('logoutBtn').addEventListener('click', () => { 
            localStorage.removeItem('isAuthorized'); 
            show('public'); 
        });
        
        document.getElementById('loginSubmit').addEventListener('click', () => {
            if(document.getElementById('accessCode').value.toUpperCase() === "SCOUT") { 
                localStorage.setItem('isAuthorized', 'true'); 
                show('contributor'); 
                document.getElementById('accessCode').value = '';
            } else {
                alert("Senha incorreta. Digite SCOUT para testar.");
            }
        });

        // --- INTELIGÊNCIA ARTIFICIAL (GEMINI) ---
        let genAI;
        try {
            genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
        } catch (e) {
            console.error("Erro ao inicializar Gemini API:", e);
        }

        function renderExtractedData(jsonData) {
            document.getElementById('loadingStatus').classList.add('hidden');
            document.getElementById('reviewPanel').classList.remove('hidden');
            document.getElementById('storeCnpj').value = jsonData.cnpj || '';
            document.getElementById('receiptDate').value = jsonData.date || '';
            
            const tbody = document.getElementById('extractedItemsTable');
            tbody.innerHTML = jsonData.items.map(i => `
                <tr>
                    <td class="p-2 border-b border-slate-100"><input class="w-full bg-transparent font-bold text-slate-800 outline-none" value="${i.name}"></td>
                    <td class="p-2 border-b border-slate-100 w-12"><input type="number" step="0.01" class="w-full bg-transparent text-slate-600 outline-none" value="${i.qtd}"></td>
                    <td class="p-2 border-b border-slate-100 w-24 text-emerald-600 font-bold"><input type="number" step="0.01" class="w-full bg-transparent outline-none" value="${i.unitPrice}"></td>
                </tr>
            `).join('');
        }

        // --- MÉTODO 1: QR CODE (SEFAZ + GEMINI) ---
        let html5QrcodeScanner = null;

        document.getElementById('btnStartQR').addEventListener('click', () => {
            document.getElementById('qrReaderContainer').classList.remove('hidden');
            // Usando window.Html5Qrcode para garantir acesso ao escopo global do script importado
            html5QrcodeScanner = new window.Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, async (decodedText) => {
                html5QrcodeScanner.stop();
                document.getElementById('qrReaderContainer').classList.add('hidden');
                document.getElementById('loadingStatus').classList.remove('hidden');
                document.getElementById('loadingStatus').innerText = "🔗 QR lido! Buscando dados na SEFAZ...";

                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(decodedText)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    document.getElementById('loadingStatus').innerText = "🧠 Estruturando dados com Gemini AI...";
                    
                    if(!genAI) throw new Error("Chave do Gemini inválida ou não configurada.");
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    
                    const prompt = `Você é um extrator de cupons fiscais brasileiros. Eis o HTML da SEFAZ: ${data.contents.substring(0, 15000)}. Extraia os dados estritamente no formato JSON abaixo, sem formatação markdown: {"cnpj":"XX.XXX.XXX/XXXX-XX", "date":"YYYY-MM-DD", "items":[{"name":"NOME", "qtd":1.0, "unitPrice":0.00}]}`;
                    
                    const result = await model.generateContent(prompt);
                    const jsonText = result.response.text().replace(/```json/g, '').replace(/
```/g, '').trim();
                    renderExtractedData(JSON.parse(jsonText));

                } catch(e) {
                    alert("Erro na leitura SEFAZ: " + e.message);
                    document.getElementById('loadingStatus').classList.add('hidden');
                }
            }).catch(err => console.log(err));
        });

        document.getElementById('btnCancelQR').addEventListener('click', () => {
            if(html5QrcodeScanner) html5QrcodeScanner.stop();
            document.getElementById('qrReaderContainer').classList.add('hidden');
        });

        // --- MÉTODO 2: UPLOAD DE IMAGEM (GEMINI VISION) ---
        document.getElementById('receiptImage').addEventListener('change', async (e) => {
            if(!e.target.files[0]) return;
            document.getElementById('loadingStatus').classList.remove('hidden');
            document.getElementById('loadingStatus').innerText = "📸 Analisando imagem do cupom...";
            
            try {
                if(!genAI) throw new Error("Chave do Gemini inválida ou não configurada.");
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async () => {
                    const imagePart = { inlineData: { data: reader.result.split(",")[1], mimeType: file.type } };
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    
                    const prompt = `Você é um extrator de cupons fiscais. Analise a imagem e extraia os dados estritamente no formato JSON abaixo, sem formatação markdown: {"cnpj":"XX.XXX.XXX/XXXX-XX", "date":"YYYY-MM-DD", "items":[{"name":"NOME DO PRODUTO", "qtd":1.0, "unitPrice":0.00}]}`;
                    
                    const result = await model.generateContent([prompt, imagePart]);
                    const jsonText = result.response.text().replace(/```json/g, '').replace(/```/g, '').trim();
                    renderExtractedData(JSON.parse(jsonText));
                };
            } catch(e) { 
                alert("Erro ao ler imagem: " + e.message); 
                document.getElementById('loadingStatus').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
